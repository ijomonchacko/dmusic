apply plugin: 'com.android.application'
apply plugin: 'org.jetbrains.kotlin.android'
apply plugin: 'dev.flutter.flutter-gradle-plugin'

android {
    namespace 'com.dmusic.android.dmusic'
    compileSdk 36
    ndkVersion '27.0.12077973'  // Use latest NDK for plugin compatibility

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    defaultConfig {
        applicationId 'com.dmusic.android.dmusic'
        minSdkVersion 24
        targetSdkVersion flutter.targetSdkVersion
        versionCode 37 
        versionName "3.0"
        
        // Override Flutter version for explicit Android versioning
        // Flutter versions are also pulled from pubspec.yaml
        
        // Multi-ABI support configuration
        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86_64', 'x86'
        }
        
        // CMake configuration for BASS-only build
        externalNativeBuild {
            cmake {
                arguments "-DANDROID_STL=c++_shared"
                cppFlags "-std=c++17"
                arguments "-DCMAKE_VERBOSE_MAKEFILE=ON"
                arguments "-DBASS_ONLY_ENGINE=1"
            }
        }
    }
    
    // Split APK configuration for different ABIs
    splits {
        abi {
            enable true
            reset()
            include 'arm64-v8a', 'armeabi-v7a', 'x86_64', 'x86'
            universalApk true // Also generate a universal APK
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.debug  // Use debug signing for now
            
            // Disable lint for release builds to avoid file locking issues
            lint {
                checkReleaseBuilds false
                abortOnError false
            }
            
            ndk {
                debugSymbolLevel 'SYMBOL_TABLE'
                // Remove abiFilters to allow --split-per-abi to work
            }
        }
        debug {
            debuggable true
            jniDebuggable false  // Disable JNI debugging for performance
            minifyEnabled false
        }
    }
    
    buildFeatures {
        prefab true
    }
    
    // Enable native build for BASS-only audio engine
    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.22.1"
        }
    }

    packagingOptions {
        // Handle native library conflicts properly
        pickFirst '**/libc++_shared.so'
        // Exclude problematic metadata files
        exclude 'META-INF/DEPENDENCIES'
        exclude 'META-INF/LICENSE*'
        exclude 'META-INF/NOTICE*'
        exclude 'META-INF/INDEX.LIST'
        exclude 'META-INF/*.RSA'
        exclude 'META-INF/*.SF'
        exclude 'META-INF/*.DSA'
        exclude 'META-INF/*.MF'
        // Exclude static libraries and debug symbols
        exclude '**/libc++_static.a'
        exclude '**/*.a'
        exclude '**/gdb.setup'
        exclude '**/gdbserver'
    }
    
    sourceSets {
        main {
            jniLibs.srcDirs = ["src/main/jniLibs"]
            jni.srcDirs = []
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation 'androidx.core:core-ktx:1.15.0'
    implementation 'com.google.android.play:core:1.10.3'
    
    // Media session and notification support
    implementation 'androidx.media:media:1.7.0'
    implementation 'androidx.legacy:legacy-support-v4:1.0.0'
    
    // Kotlin coroutines for async operations
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
    
    // BASS-only audio engine via native CMake build
}
